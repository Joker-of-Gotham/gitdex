suggestion:
  mode: "zen"
  language: "auto"
llm:
  provider: "ollama"
  model: "qwen2.5:3b"
  endpoint: "http://localhost:11434"
  api_key_env: ""
  request_timeout: 120
sync:
  auto_fetch_interval: 300
automation:
  enabled: true
  monitor_interval: 300
  auto_analyze: true
  unattended: false
  auto_accept_safe: false
  trusted_mode: false
  max_auto_steps: 8
  schedules: []
adapters:
  github:
    gh:
      enabled: true
      binary: "gh"
    browser:
      enabled: false
      driver: "default"
  gitlab:
    browser:
      enabled: false
      driver: "default"
  bitbucket:
    browser:
      enabled: false
      driver: "default"
theme:
  name: "dark"
i18n:
  language: "auto"
