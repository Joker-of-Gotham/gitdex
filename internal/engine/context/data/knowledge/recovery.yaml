scenarios:
  - id: recovery_triage
    triggers:
      always: true
    sop: |
      事故分诊决策树:
      Q1: 改动是否已提交?
        No → Q2: 文件是新文件(untracked)还是已跟踪?
          新文件 → 无法用 git 恢复，检查编辑器/IDE 缓存
          已跟踪 → git restore <file> 或 git checkout -- <file>
        Yes → Q3: 提交是否已推送到远端?
          No → Q4: 是最后一个提交吗?
            最后一个 → git reset --soft HEAD~1 (保留改动在暂存区)
            更早的 → git rebase -i 或 git reset --soft <commit>
          Yes → git revert <commit> (创建反向提交)
      紧急恢复: git reflog → 找到目标 → git reset --hard <hash>

  - id: undo_working_changes
    triggers:
      working_count_gt: 0
    sop: |
      撤销工作区改动:
      单个文件: git restore <file>
      全部文件: git restore .
      只撤销暂存: git restore --staged <file>
      同时撤销暂存和工作区: git restore --staged --worktree <file>
    pitfalls:
      - git restore 丢弃的工作区改动无法恢复
      - 大量改动丢弃前建议 git stash 备份

  - id: undo_staged_changes
    triggers:
      staged_count_gt: 0
    sop: |
      撤销暂存区改动（已 add 但未 commit）:
      单个: git restore --staged <file>
      全部: git restore --staged .
      改动会回到工作区，不会丢失
    pitfalls:
      - 这只是取消暂存，文件内容不变
      - 和 git reset HEAD <file> 效果相同

  - id: reflog_rescue
    triggers:
      always: false
    sop: |
      Reflog 救援三步曲:
      1. git reflog — 查看最近 HEAD 移动记录
      2. 找到目标状态的 hash
      3. git reset --hard <hash> 或 git checkout <hash>
      也可以: git branch rescue-branch <hash>
    pitfalls:
      - reflog 默认保留 90 天
      - reflog 只记录 HEAD 移动，不包含从未提交的改动
      - 恢复前先确认当前工作区已保存或 stash
