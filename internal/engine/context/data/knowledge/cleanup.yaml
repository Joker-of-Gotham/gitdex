scenarios:
  - id: branch_cleanup
    triggers:
      branch_count_gt: 5
    sop: |
      分支善后清理:
      1. git branch --merged — 列出已合并的分支
      2. git branch -d <branch> — 安全删除已合并分支
      3. git remote prune origin — 清理已删除的远端分支本地引用
      4. git fetch --prune — 同步远端分支状态
    pitfalls:
      - git branch -d 只能删除已合并分支
      - 使用 -D 强制删除时确认分支确实不再需要

  - id: interactive_rebase_cleanup
    triggers:
      commit_count_gt: 3
    sop: |
      历史整理 (rebase -i):
      1. git rebase -i HEAD~N (N 为要整理的提交数)
      2. 可用操作:
         pick — 保留
         squash — 合并到前一个提交
         fixup — 合并但丢弃消息
         reword — 修改提交消息
         drop — 删除提交
      3. 使用 --autosquash 自动处理 fixup!/squash! 前缀
    pitfalls:
      - 只对未推送的本地提交使用
      - 已推送的提交 rebase 后需要 force push
      - 操作前确保有备份分支

  - id: branch_naming
    triggers:
      always: true
    sop: |
      分支命名规范建议:
      feature/<ticket>-<description>  新功能
      fix/<ticket>-<description>      修复
      hotfix/<description>            紧急修复
      release/<version>               发布分支
      chore/<description>             杂务
    pitfalls:
      - 避免空格和特殊字符
      - 保持名称简洁但有意义
