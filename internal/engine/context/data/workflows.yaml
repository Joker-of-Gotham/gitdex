workflows:
  - id: submit_pr
    label: "提交 Pull Request"
    goal: "Create and submit a pull request for the current branch, then prepare review context, requested reviewers, and merge-readiness checks."
    prerequisites: ["has_remote", "has_commits_ahead"]
    capabilities: ["pull_request", "pr_review"]
    prefill:
      - capability_id: "pull_request"
        flow: "inspect"
      - capability_id: "pr_review"
        flow: "inspect"
      - capability_id: "pr_review"
        flow: "inspect"
        query:
          view: "requested_reviewers"

  - id: pr_review_approval
    label: "PR 审查与批准"
    goal: "Inspect PR review state, requested reviewers, approval requirements, branch protections, and merge readiness for the current repository."
    prerequisites: ["has_remote", "is_github_remote|is_gitlab_remote|is_bitbucket_remote"]
    capabilities: ["pull_request", "pr_review", "branch_rulesets"]
    prefill:
      - capability_id: "pull_request"
        flow: "inspect"
      - capability_id: "pr_review"
        flow: "inspect"
      - capability_id: "pr_review"
        flow: "inspect"
        query:
          view: "reviews"

  - id: sync_upstream
    label: "同步上游仓库"
    goal: "Sync fork with upstream repository safely and verify divergence before integration."
    prerequisites: ["has_upstream_remote"]

  - id: release
    label: "发布版本"
    goal: "Prepare, tag, validate, and publish a release with release notes, assets, changelog, and CI checks."
    prerequisites: ["has_remote", "has_commits"]
    capabilities: ["release"]
    prefill:
      - capability_id: "release"
        flow: "inspect"
        query:
          view: "latest"
      - capability_id: "release"
        flow: "inspect"
        query:
          view: "assets"
      - capability_id: "release"
        flow: "mutate"
        operation: "create"
        payload:
          tag_name: "<release_tag>"
          target_commitish: "<default_branch>"
          name: "<release_name>"
          body: "<release_notes>"
          draft: true
        validate:
          draft: true
        rollback:
          delete_created_release: true
      - capability_id: "release"
        flow: "mutate"
        operation: "asset_upload"
        scope:
          release_id: "<draft_release_id>"
        payload:
          file_path: "<release_asset_path>"
          asset_name: "<release_asset_name>"
          label: "<release_asset_label>"
        validate:
          asset_uploaded: true
        rollback:
          delete_uploaded_asset: true
      - capability_id: "release"
        flow: "inspect"
        query:
          view: "assets"
          release_id: "<draft_release_id>"
      - capability_id: "release"
        flow: "mutate"
        operation: "publish_draft"
        resource_id: "<draft_release_id>"
        validate:
          draft: false
        rollback:
          draft: true
      - capability_id: "release"
        flow: "mutate"
        operation: "asset_delete"
        resource_id: "<release_asset_id>"
        scope:
          release_id: "<draft_release_id>"
        validate:
          asset_deleted: true
        rollback:
          restore_deleted_asset: true

  - id: deployment_pipeline
    label: "部署流程 / AI Assistant 部署"
    goal: "Design or improve deployment pipelines, environments, runtime secrets, GitHub Actions, and AI assistant deployment flow for this repository."
    prerequisites: ["has_remote", "is_github_remote|is_gitlab_remote|is_bitbucket_remote"]
    capabilities: ["deployment", "environments", "actions", "actions_secrets_variables"]
    prefill:
      - capability_id: "deployment"
        flow: "inspect"
      - capability_id: "environments"
        flow: "inspect"
      - capability_id: "actions"
        flow: "inspect"
        query:
          view: "workflows"
      - capability_id: "actions_secrets_variables"
        flow: "inspect"
        scope:
          kind: "variable"
          scope: "repository"

  - id: pages_setup
    label: "Pages / 静态站点"
    goal: "Plan and configure full Pages hosting, build workflow, build history inspection, custom domain readiness, and environment linkage."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["pages", "environments"]
    prefill:
      - capability_id: "pages"
        flow: "inspect"
        query:
          view: "site"
      - capability_id: "pages"
        flow: "inspect"
        query:
          view: "latest_build"
      - capability_id: "pages"
        flow: "inspect"
        query:
          view: "build_history"
      - capability_id: "pages"
        flow: "inspect"
        query:
          view: "domain"
      - capability_id: "pages"
        flow: "inspect"
        query:
          view: "dns"
      - capability_id: "pages"
        flow: "inspect"
        query:
          view: "health"
      - capability_id: "pages"
        flow: "mutate"
        operation: "update"
        payload:
          build_type: "workflow"
          source:
            branch: "<default_branch>"
            path: "/"
        validate:
          build_type: "workflow"
          source:
            branch: "<default_branch>"
            path: "/"
        rollback:
          build_type: "legacy"
          source:
            branch: "<default_branch>"
            path: "/"
      - capability_id: "pages"
        flow: "mutate"
        operation: "build"
        validate:
          status: "built"
      - capability_id: "pages"
        flow: "validate"
        operation: "build"
        payload:
          status: "built"
      - capability_id: "pages"
        flow: "mutate"
        operation: "update"
        payload:
          cname: "<pages_domain>"
          https_enforced: true
        validate:
          cname: "<pages_domain>"
          https_enforced: true
        rollback:
          cname: ""
          https_enforced: false
      - capability_id: "pages"
        flow: "validate"
        operation: "update"
        payload:
          cname: "<pages_domain>"
          protected_domain_state: "verified"
      - capability_id: "pages"
        flow: "validate"
        operation: "update"
        payload:
          cname: "<pages_domain>"
          https_enforced: true
          https_certificate:
            state: "approved"
      - capability_id: "environments"
        flow: "inspect"

  - id: packages_codespaces
    label: "Packages / Codespaces"
    goal: "Set up or audit package publishing, Codespaces dev environments, variables, secrets, package retention, and developer onboarding flow."
    prerequisites: ["has_remote", "is_github_remote|is_bitbucket_remote|is_gitlab_remote"]
    capabilities: ["packages", "codespaces", "codespaces_secrets"]
    prefill:
      - capability_id: "packages"
        flow: "inspect"
      - capability_id: "codespaces"
        flow: "inspect"
        query:
          view: "list"
      - capability_id: "codespaces_secrets"
        flow: "inspect"

  - id: security_hardening
    label: "安全与规则治理"
    goal: "Audit repository security posture including rulesets, branch protections, webhooks, secrets, dependency and code scanning, and recommend the next secure actions."
    prerequisites: ["has_remote", "is_github_remote|is_gitlab_remote|is_bitbucket_remote"]
    capabilities: ["rulesets", "branch_rulesets", "webhooks", "actions_secrets_variables"]
    prefill:
      - capability_id: "rulesets"
        flow: "inspect"
      - capability_id: "branch_rulesets"
        flow: "inspect"
        query:
          view: "branch_rules"
          branch: "<default_branch>"
      - capability_id: "webhooks"
        flow: "inspect"

  - id: advanced_security
    label: "Advanced Security"
    goal: "Audit and plan GitHub Advanced Security features: private vulnerability reporting, dependency graph, Dependabot, code scanning, CodeQL, secret protection, push protection, and Copilot Autofix."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["advanced_security", "dependabot_config", "dependabot_alerts", "code_scanning", "codeql_analysis", "secret_protection", "push_protection", "private_vulnerability_reporting", "copilot_autofix"]
    prefill:
      - capability_id: "advanced_security"
        flow: "inspect"
        query:
          view: "summary"
      - capability_id: "dependabot_config"
        flow: "inspect"
      - capability_id: "dependabot_alerts"
        flow: "inspect"
      - capability_id: "code_scanning"
        flow: "inspect"
        query:
          view: "default_setup"
      - capability_id: "secret_protection"
        flow: "inspect"
      - capability_id: "private_vulnerability_reporting"
        flow: "inspect"

  - id: rulesets_branch_policies
    label: "Rulesets 与分支策略"
    goal: "Configure or audit repository rulesets, branch rulesets, environment protection rules, check run thresholds, and merge policies."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["rulesets", "branch_rulesets", "environments"]
    prefill:
      - capability_id: "rulesets"
        flow: "inspect"
      - capability_id: "branch_rulesets"
        flow: "inspect"
        query:
          view: "branch_rules"
          branch: "<default_branch>"
      - capability_id: "environments"
        flow: "inspect"

  - id: webhooks_integrations
    label: "Webhooks 与集成"
    goal: "Plan and verify webhook endpoints, event subscriptions, delivery health, and downstream automation consumers."
    prerequisites: ["has_remote", "is_github_remote|is_gitlab_remote|is_bitbucket_remote"]
    capabilities: ["webhooks"]
    prefill:
      - capability_id: "webhooks"
        flow: "inspect"

  - id: secrets_variables
    label: "Secrets / Variables"
    goal: "Audit and configure Actions secrets and variables, Codespaces secrets, Dependabot secrets, deploy keys, and environment-scoped credentials."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["actions_secrets_variables", "codespaces_secrets", "dependabot_secrets", "deploy_keys"]
    prefill:
      - capability_id: "actions_secrets_variables"
        flow: "inspect"
        scope:
          kind: "secret"
          scope: "repository"
      - capability_id: "codespaces_secrets"
        flow: "inspect"
      - capability_id: "dependabot_secrets"
        flow: "inspect"
      - capability_id: "deploy_keys"
        flow: "inspect"

  - id: actions_audit
    label: "Actions 与自动化"
    goal: "Review GitHub Actions workflows, permissions, reusable workflows, notifications, deployment gates, and automation correctness."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["actions", "actions_secrets_variables", "environments", "notifications"]
    prefill:
      - capability_id: "actions"
        flow: "inspect"
        query:
          view: "workflows"
      - capability_id: "actions_secrets_variables"
        flow: "inspect"
        scope:
          kind: "variable"
          scope: "repository"
      - capability_id: "environments"
        flow: "inspect"
      - capability_id: "notifications"
        flow: "inspect"
        query:
          view: "repo_subscription"

  - id: packages_cleanup_restore
    label: "Packages 清理与恢复"
    goal: "Inspect package versions, remove stale package artifacts safely, and validate or roll back package state when needed."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["packages"]
    prefill:
      - capability_id: "packages"
        flow: "inspect"
        query:
          view: "latest_version"

  - id: notifications_routing
    label: "通知与订阅路由"
    goal: "Inspect repository watch state, thread subscriptions, and email notification routing for actionable platform events."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["notifications", "email_notifications"]
    prefill:
      - capability_id: "notifications"
        flow: "inspect"
        query:
          view: "global_inbox"
      - capability_id: "email_notifications"
        flow: "inspect"
        query:
          view: "repo_subscription"

  - id: copilot_admin
    label: "Copilot Admin"
    goal: "Inspect and configure GitHub Copilot admin surfaces including metrics, seats, and content exclusions for code review and coding agent rollout."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["copilot_code_review", "copilot_coding_agent", "copilot_seat_management"]
    prefill:
      - capability_id: "copilot_code_review"
        flow: "inspect"
        query:
          view: "content_exclusions"
      - capability_id: "copilot_coding_agent"
        flow: "inspect"
        query:
          view: "metrics"
      - capability_id: "copilot_seat_management"
        flow: "inspect"
        query:
          view: "seats"

  - id: deploy_key_rotation
    label: "Deploy Key 轮换"
    goal: "Inspect existing deploy keys, rotate or replace keys safely, and verify downstream SSH consumers."
    prerequisites: ["has_remote", "is_github_remote"]
    capabilities: ["deploy_keys"]
    prefill:
      - capability_id: "deploy_keys"
        flow: "inspect"

  - id: resolve_conflicts
    label: "解决冲突"
    goal: "Resolve current merge, rebase, or cherry-pick conflicts and complete the interrupted workflow safely."
    prerequisites: ["merge_in_progress|rebase_in_progress|cherry_in_progress"]

  - id: branch_cleanup
    label: "清理分支"
    goal: "Delete merged or stale branches after checking protection and remote tracking state."

  - id: partial_stage
    label: "分阶段暂存"
    goal: "Selectively stage changes using git add -p or an equivalent safe staging flow for precise commit boundaries."
    prerequisites: ["has_working_changes"]

  - id: generate_commit_msg
    label: "AI 生成提交消息"
    goal: "Generate, review, and refine a high-quality commit message for the staged changes."
    prerequisites: ["has_staged"]

  - id: recovery_triage
    label: "撤销 / 恢复"
    goal: "Diagnose the safest undo, restore, revert, reset, or reflog strategy for the current state."

  - id: history_cleanup
    label: "历史整理"
    goal: "Clean up commit history using interactive rebase with safe checks and rollback options."
    prerequisites: ["has_commits"]

  - id: setup_auth
    label: "配置认证"
    goal: "Set up Git identity, SSH keys, deploy keys, credential helpers, and repository authentication flow."
    capabilities: ["deploy_keys"]
    prefill:
      - capability_id: "deploy_keys"
        flow: "inspect"

  - id: inspect_full
    label: "全面检查"
    goal: "Run a comprehensive repository health check across Git state, remotes, CI, platform settings, security posture, and automation."
    capabilities: ["rulesets", "webhooks", "pages"]
    prefill:
      - capability_id: "rulesets"
        flow: "inspect"
      - capability_id: "webhooks"
        flow: "inspect"
      - capability_id: "pages"
        flow: "inspect"

  - id: safe_sync
    label: "安全同步"
    goal: "Safely sync with remote using fetch-inspect-integrate-push flow instead of a blind pull."
    prerequisites: ["has_remote"]

  - id: stash_manage
    label: "暂存管理"
    goal: "Save work in progress to stash or restore prior stash entries without losing local changes."
    prerequisites: ["has_working_changes|has_stash"]
