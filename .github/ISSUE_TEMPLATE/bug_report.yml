name: Bug report
description: Report a defect, regression, or broken flow in gitdex.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1. Start gitdex in ...
        2. Open the ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Git version, Ollama version, model, and repo state.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, Timeline output, or screenshots. Remove secrets first.
